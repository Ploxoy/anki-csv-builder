services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ankicards
      POSTGRES_USER: ankicards
      POSTGRES_PASSWORD: ankicards
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ankicards"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    volumes:
      - .:/app
    working_dir: /app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      API_SHARED_SECRET: ${API_SHARED_SECRET:-}
      API_REQUIRE_SHARED_SECRET: ${API_REQUIRE_SHARED_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      # NOTE: we intentionally do NOT use ${DATABASE_URL} here, because many devs
      # keep DATABASE_URL=...@localhost in .env for non-docker runs.
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://ankicards:ankicards@db:5432/ankicards}
    depends_on:
      - db

  web:
    image: node:20-slim
    working_dir: /app/web
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "${WEB_PORT:-5173}:5173"
    environment:
      VITE_API_TARGET: http://api:8000
    volumes:
      - ./web:/app/web
      - web_node_modules:/app/web/node_modules
    depends_on:
      - api

volumes:
  pgdata:
  web_node_modules:
