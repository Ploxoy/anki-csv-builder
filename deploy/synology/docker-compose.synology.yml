services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.1.1
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
        max-file: "${DOCKER_LOG_MAX_FILE:-3}"
    environment:
      CONTAINERS: 1
      POST: 1
      PING: 1
      EVENTS: 0
      IMAGES: 0
      NETWORKS: 0
      NODES: 0
      SERVICES: 0
      SYSTEM: 0
      TASKS: 0
      VOLUMES: 0
      INFO: 0
      VERSION: 0
      AUTH: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EXEC: 0
      GRPC: 0
      PLUGINS: 0
      SECRETS: 0
      SESSION: 0
      SWARM: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  db:
    image: postgres:16-alpine
    container_name: anki_db
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
        max-file: "${DOCKER_LOG_MAX_FILE:-3}"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ankicards}
      POSTGRES_USER: ${POSTGRES_USER:-ankicards}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ankicards}
    volumes:
      - ${SYNO_BASE_PATH}/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ankicards}"]
      interval: ${DB_HEALTHCHECK_INTERVAL:-90s}
      timeout: ${DB_HEALTHCHECK_TIMEOUT:-5s}
      retries: ${DB_HEALTHCHECK_RETRIES:-3}

  api:
    container_name: anki_api
    build:
      context: ../..
      dockerfile: Dockerfile.api
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
        max-file: "${DOCKER_LOG_MAX_FILE:-3}"
    environment:
      API_SHARED_SECRET: ${API_SHARED_SECRET}
      API_REQUIRE_SHARED_SECRET: ${API_REQUIRE_SHARED_SECRET:-1}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-ankicards}:${POSTGRES_PASSWORD:-ankicards}@db:5432/${POSTGRES_DB:-ankicards}
    ports:
      - "${API_PORT:-8000}:8000"
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --no-access-log --log-level warning
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).status == 200 else 1)",
        ]
      interval: ${API_HEALTHCHECK_INTERVAL:-120s}
      timeout: ${API_HEALTHCHECK_TIMEOUT:-7s}
      retries: ${API_HEALTHCHECK_RETRIES:-3}
      start_period: ${API_HEALTHCHECK_START_PERIOD:-35s}
    volumes:
      - ${SYNO_BASE_PATH}/cache:/app/cache
      - ${SYNO_BASE_PATH}/logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

  web:
    container_name: anki_web
    build:
      context: ../..
      dockerfile: web/deploy/Dockerfile.synology
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
        max-file: "${DOCKER_LOG_MAX_FILE:-3}"
    depends_on:
      - api

  waker:
    build:
      context: ../..
      dockerfile: deploy/synology/waker/Dockerfile
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
        max-file: "${DOCKER_LOG_MAX_FILE:-3}"
    environment:
      WAKER_DOCKER_API_BASE: http://socket-proxy:2375
      WAKER_TARGET_BASE: http://anki_web:80
      WAKER_SERVICE_ORDER: anki_db,anki_api,anki_web
      WAKER_IDLE_STOP: ${WAKER_IDLE_STOP:-1}
      WAKER_IDLE_MINUTES: ${WAKER_IDLE_MINUTES:-60}
      WAKER_IDLE_CHECK_SECONDS: ${WAKER_IDLE_CHECK_SECONDS:-30}
      WAKER_START_TIMEOUT_SECONDS: ${WAKER_START_TIMEOUT_SECONDS:-120}
      WAKER_TOUCH_FLUSH_SECONDS: ${WAKER_TOUCH_FLUSH_SECONDS:-15}
      WAKER_PROXY_TIMEOUT_SECONDS: ${WAKER_PROXY_TIMEOUT_SECONDS:-120}
      WAKER_LOG_LEVEL: ${WAKER_LOG_LEVEL:-info}
    ports:
      - "${WEB_PORT:-5173}:8080"
    volumes:
      - ${SYNO_BASE_PATH}/waker:/state
    depends_on:
      - socket-proxy
