services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ankicards}
      POSTGRES_USER: ${POSTGRES_USER:-ankicards}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ankicards}
    volumes:
      - ${SYNO_BASE_PATH}/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ankicards}"]
      interval: 10s
      timeout: 5s
      retries: 8

  api:
    build:
      context: ../..
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      API_SHARED_SECRET: ${API_SHARED_SECRET}
      API_REQUIRE_SHARED_SECRET: ${API_REQUIRE_SHARED_SECRET:-1}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-ankicards}:${POSTGRES_PASSWORD:-ankicards}@db:5432/${POSTGRES_DB:-ankicards}
    ports:
      - "${API_PORT:-8000}:8000"
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).status == 200 else 1)",
        ]
      interval: 20s
      timeout: 7s
      retries: 6
      start_period: 25s
    volumes:
      - ${SYNO_BASE_PATH}/cache:/app/cache
      - ${SYNO_BASE_PATH}/logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: web/deploy/Dockerfile.synology
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      - api
