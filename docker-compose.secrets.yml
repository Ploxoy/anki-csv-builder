services:
  api:
    secrets:
      - API_SHARED_SECRET
      - OPENAI_API_KEY
      - ELEVENLABS_API_KEY

secrets:
  # Store these files locally (not committed). Compose will mount them at /run/secrets/<name>.
  API_SHARED_SECRET:
    file: ./secrets/API_SHARED_SECRET
  OPENAI_API_KEY:
    file: ./secrets/OPENAI_API_KEY
  ELEVENLABS_API_KEY:
    file: ./secrets/ELEVENLABS_API_KEY

